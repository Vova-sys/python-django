{% extends 'main_template.html' %}

{% block login %}
<a href="{% url 'social:begin' 'github' %}">Github</a>
<a href="{% url 'social:begin' 'google-oauth2' %}">Google+</a>
{% for m in messages %}
    <h3 class="text-danger">{{ m }}</h3>
{% endfor %}
<form action="{% url 'login' %}" method="post">
    {% csrf_token %}
    {{ form }}
    <button type="submit">OK</button>
</form>
{% endblock %}
